<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Horizon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .blue-accent { color: #3B82F6; }
        .bg-blue-accent { background-color: #3B82F6; }
        
        .blur-blue {
            background: radial-gradient(circle, rgba(59, 130, 246, 0.4) 0%, transparent 70%);
            filter: blur(28px);
            pointer-events: none;
        }
        .blur-dot { background: #3B82F6; filter: blur(2px); box-shadow: 0 0 6px rgba(59,130,246,.6); }
        
        .glass {
            background: rgba(255,255,255,.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        @keyframes soundwave {
            0%, 100% { height: 3px; }
            50% { height: 12px; }
        }
        .bar {
            width: 2.5px;
            background-color: #3B82F6;
            border-radius: 2px;
            animation: soundwave .7s ease-in-out infinite;
        }
        .bar:nth-child(1){animation-delay:0s}
        .bar:nth-child(2){animation-delay:.15s}
        .bar:nth-child(3){animation-delay:.3s}
        .bar:nth-child(4){animation-delay:.1s}

        .view {
            position: absolute;
            inset: 0;
            transition: transform .45s cubic-bezier(.16,1,.3,1), opacity .35s ease;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .view::-webkit-scrollbar { display: none; }
        .view { -ms-overflow-style: none; scrollbar-width: none; }

        #library-view { transform: translateY(0); opacity: 1; }
        #library-view.hidden-view { transform: translateY(30px); opacity: 0; pointer-events: none; }
        #now-playing-view { transform: translateY(100%); opacity: 0; pointer-events: none; background: #fff; }
        #now-playing-view.active-view { transform: translateY(0); opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-white text-black min-h-screen antialiased">

    <div class="relative w-full min-h-screen max-w-md mx-auto overflow-hidden">

        <!-- ================= LIBRARY VIEW ================= -->
        <section id="library-view" class="view pb-36 pt-10 px-6">
            <div class="blur-blue fixed top-0 right-0 w-[400px] h-[400px] -mr-20 -mt-20 opacity-30 z-0"></div>
            <div class="blur-blue fixed bottom-0 left-0 w-[300px] h-[300px] -ml-20 -mb-20 opacity-20 z-0"></div>

            <div class="relative z-10">
                <header class="mb-10">
                    <div class="flex items-center justify-between mb-1">
                        <h1 class="text-[28px] font-black tracking-[-0.02em] text-black">Horizon</h1>
                        <div class="flex items-center gap-2">
                            <button class="w-10 h-10 rounded-full bg-white border border-neutral-200 flex items-center justify-center hover:bg-neutral-50 transition-colors shadow-sm">
                                <i class="ph ph-magnifying-glass text-lg text-black"></i>
                            </button>
                            <button class="w-10 h-10 rounded-full bg-white border border-neutral-200 flex items-center justify-center hover:bg-neutral-50 transition-colors shadow-sm relative">
                                <i class="ph ph-bell text-lg text-black"></i>
                                <span class="absolute top-2.5 right-2.5 w-2 h-2 blur-dot rounded-full"></span>
                                <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-blue-accent rounded-full"></span>
                            </button>
                        </div>
                    </div>
                    <p class="text-[13px] text-neutral-500 font-medium">Learn through listening</p>
                </header>

                <div class="flex gap-2 mb-8 overflow-x-auto hide-scrollbar pb-1">
                    <button class="px-4 py-1.5 rounded-full bg-black text-white text-xs font-semibold whitespace-nowrap">Recent</button>
                    <button class="px-4 py-1.5 rounded-full bg-white border border-neutral-200 text-neutral-600 text-xs font-medium whitespace-nowrap hover:border-black hover:text-black transition-colors">Title</button>
                    <button class="px-4 py-1.5 rounded-full bg-white border border-neutral-200 text-neutral-600 text-xs font-medium whitespace-nowrap hover:border-black hover:text-black transition-colors">Duration</button>
                    <button class="px-4 py-1.5 rounded-full bg-white border border-neutral-200 text-neutral-600 text-xs font-medium whitespace-nowrap hover:border-black hover:text-black transition-colors">Language</button>
                </div>

                <div id="track-list"></div>
            </div>
        </section>

        <!-- ================= NOW PLAYING VIEW ================= -->
        <section id="now-playing-view" class="view">
            <div class="relative z-10 flex flex-col h-screen min-h-screen px-8">

                <!-- Header -->
                <header class="flex items-center justify-between pt-4 pb-2 flex-shrink-0">
                    <button onclick="closeNowPlaying()" class="w-10 h-10 flex items-center justify-center text-black hover:bg-neutral-100 active:scale-95 rounded-full transition-all -ml-2">
                        <i class="ph ph-caret-down text-xl"></i>
                    </button>
                    <button class="w-10 h-10 flex items-center justify-center text-black hover:bg-neutral-100 active:scale-95 rounded-full transition-all -mr-2">
                        <i class="ph ph-dots-three text-xl"></i>
                    </button>
                </header>

                <main class="flex-1 flex flex-col justify-center py-6">

                    <!-- Compact Album Art -->
                    <div class="relative w-56 h-56 mx-auto mb-10">
                        <div class="blur-blue absolute inset-0 scale-90 opacity-30 rounded-full"></div>
                        <div class="relative w-full h-full rounded-2xl bg-gradient-to-br from-neutral-900 via-neutral-800 to-black shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] flex items-center justify-center overflow-hidden">
                            <span id="np-initials" class="text-[72px] font-black tracking-tighter text-white/90 leading-none select-none">SJ</span>
                        </div>
                    </div>

                    <!-- Track Info -->
                    <div class="text-center mb-10">
                        <h3 id="np-title" class="text-[24px] font-bold text-black tracking-tight leading-tight mb-2">Basic Greetings</h3>
                        <p id="np-artist" class="text-[15px] text-neutral-600 font-semibold">Short English Conversations</p>
                    </div>

                    <!-- Progress Bar -->
                    <div class="mb-8">
                        <div class="relative h-1 bg-neutral-200 rounded-full cursor-pointer group">
                            <div id="np-progress-fill" class="h-1 bg-blue-accent rounded-full relative transition-all" style="width: 16%;">
                                <div class="absolute right-0 top-1/2 -translate-y-1/2 translate-x-1/2 w-4 h-4 bg-blue-accent rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-sm"></div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span id="np-current-time" class="text-[11px] text-neutral-500 font-medium tabular-nums">0:12</span>
                            <span id="np-total-time" class="text-[11px] text-neutral-500 font-medium tabular-nums">-1:03</span>
                        </div>
                    </div>

                    <!-- CONTROLS: Smaller Play + Text-Only Skip -->
                    <div class="flex items-center gap-4 mb-10">
                        <!-- Backward -10s (Text-only, no background) -->
                        <button onclick="skip(-10)" class="flex-1 text-black font-semibold text-[14px] active:scale-95 transition-transform py-2">
                            -10s
                        </button>

                        <!-- Play / Pause (Smaller, Text-only pill) -->
                        <button id="np-play-btn" onclick="toggleNpPlay()" class="flex-[1.5] bg-blue-accent text-white py-2.5 rounded-full font-bold text-[14px] active:scale-95 transition-transform shadow-[0_4px_12px_-4px_rgba(59,130,246,0.5)]">
                            <span id="np-play-text">Play</span>
                        </button>

                        <!-- Forward +10s (Text-only, no background) -->
                        <button onclick="skip(10)" class="flex-1 text-black font-semibold text-[14px] active:scale-95 transition-transform py-2">
                            +10s
                        </button>
                    </div>
                </main>

                <div class="flex-shrink-0 h-6"></div>
            </div>
        </section>

        <!-- ================= BOTTOM NAV ================= -->
        <nav id="bottom-nav" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md glass border-t border-neutral-100 px-6 py-2.5 z-40 transition-all duration-500">
            <div class="flex justify-between items-center">
                <button class="flex flex-col items-center gap-0.5 py-1 px-3">
                    <i class="ph-fill ph-book-open text-[20px] blue-accent"></i>
                    <span class="text-[10px] font-semibold blue-accent">Library</span>
                </button>
                <button class="flex flex-col items-center gap-0.5 py-1 px-3">
                    <i class="ph ph-list-dashes text-[20px] text-neutral-400 hover:text-black transition-colors"></i>
                    <span class="text-[10px] font-medium text-neutral-500 hover:text-black transition-colors">Playlists</span>
                </button>
                <button class="flex flex-col items-center gap-0.5 py-1 px-3">
                    <i class="ph ph-play-circle text-[20px] text-neutral-400 hover:text-black transition-colors"></i>
                    <span class="text-[10px] font-medium text-neutral-500 hover:text-black transition-colors">Playing</span>
                </button>
                <button class="flex flex-col items-center gap-0.5 py-1 px-3">
                    <i class="ph ph-gear text-[20px] text-neutral-400 hover:text-black transition-colors"></i>
                    <span class="text-[10px] font-medium text-neutral-500 hover:text-black transition-colors">Settings</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        const tracks = [
            { id: 1, title: "Steve Jobs — Stanford Speech", subtitle: "Motivational Talks", duration: "15:43", listened: "12:34", hasCC: true, initials: "SJ" },
            { id: 2, title: "The Office — Season 3", subtitle: "TV Show Audio", duration: "22:18", listened: "5:20", hasCC: true, initials: "OF" },
            { id: 3, title: "BBC News Hour — Daily", subtitle: "News & Current Affairs", duration: "58:02", listened: "0:00", hasCC: false, initials: "BN" },
            { id: 4, title: "TED: How to Speak So Powerfully", subtitle: "Public Speaking", duration: "09:48", listened: "0:00", hasCC: true, initials: "TD" },
            { id: 5, title: "Friends — The One Where...", subtitle: "TV Show Audio", duration: "22:34", listened: "0:00", hasCC: false, initials: "FR" }
        ];

        let currentTrackId = 1;
        let isPlaying = false;
        let nowPlayingOpen = false;

        function formatTime(totalSeconds, currentSeconds) {
            const remaining = totalSeconds - currentSeconds;
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            return `-${m}:${s.toString().padStart(2, '0')}`;
        }

        function renderTracks() {
            const listContainer = document.getElementById('track-list');
            listContainer.innerHTML = '';

            tracks.forEach(track => {
                const isActive = track.id === currentTrackId;
                const statusText = track.listened === "0:00" ? "Not started" : `Listened ${track.listened}`;

                const ccHtml = track.hasCC
                    ? `<span class="inline-flex items-center gap-0.5 blue-accent text-[11px] font-semibold"><i class="ph-fill ph-closed-captioning text-[10px]"></i>CC</span>`
                    : `<span class="inline-flex items-center gap-0.5 text-neutral-400 text-[11px] font-medium"><i class="ph ph-closed-captioning-slash text-[10px]"></i>No CC</span>`;

                const playingIndicator = isActive && isPlaying
                    ? `<div class="flex items-end gap-[2px] h-3 mr-1.5">
                         <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                       </div>`
                    : '';

                const activeGlow = isActive
                    ? `<div class="blur-blue absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[200%] opacity-20"></div>`
                    : '';

                const cardHtml = `
                    <div onclick="openNowPlaying(${track.id})" class="relative py-3.5 flex items-center gap-3.5 border-b border-neutral-100 last:border-0 cursor-pointer group overflow-hidden">
                        ${activeGlow}
                        <div class="w-12 h-12 rounded-xl ${isActive ? 'bg-blue-accent' : 'bg-black'} flex items-center justify-center flex-shrink-0 relative z-10 transition-all">
                            <span class="text-white font-bold text-[11px]">${track.initials}</span>
                        </div>
                        <div class="flex-1 min-w-0 relative z-10">
                            <div class="flex items-center mb-0.5">
                                ${playingIndicator}
                                <h3 class="font-semibold text-[14px] text-black truncate leading-tight">${track.title}</h3>
                            </div>
                            <div class="flex items-center gap-1.5 text-[12px] text-neutral-500">
                                ${ccHtml}
                                <span class="text-neutral-300">·</span>
                                <span class="${isActive ? 'text-neutral-700' : ''}">${statusText}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-1 flex-shrink-0 relative z-10">
                            <span class="text-[11px] text-neutral-500 tabular-nums font-medium">${track.duration}</span>
                            <i class="ph ph-caret-right ${isActive ? 'blue-accent' : 'text-neutral-300'} text-sm group-hover:text-black transition-colors"></i>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += cardHtml;
            });
        }

        function openNowPlaying(id) {
            currentTrackId = id;
            nowPlayingOpen = true;

            const track = tracks.find(t => t.id === id);
            document.getElementById('np-title').innerText = track.title;
            document.getElementById('np-artist').innerText = track.subtitle;
            document.getElementById('np-initials').innerText = track.initials;

            const parseTime = (t) => {
                const [m, s] = t.split(':').map(Number);
                return m * 60 + s;
            };
            const listened = track.listened === "0:00" ? "00:00" : track.listened;
            const current = parseTime(listened);
            const total = parseTime(track.duration);
            const pct = Math.min(100, (current / total) * 100);
            
            document.getElementById('np-progress-fill').style.width = pct + '%';
            document.getElementById('np-current-time').innerText = listened;
            document.getElementById('np-total-time').innerText = formatTime(total, current);

            document.getElementById('library-view').classList.add('hidden-view');
            document.getElementById('now-playing-view').classList.add('active-view');
            document.getElementById('bottom-nav').style.transform = 'translate(-50%, 100%)';
            document.getElementById('bottom-nav').style.opacity = '0';
        }

        function closeNowPlaying() {
            nowPlayingOpen = false;
            document.getElementById('library-view').classList.remove('hidden-view');
            document.getElementById('now-playing-view').classList.remove('active-view');
            document.getElementById('bottom-nav').style.transform = 'translate(-50%, 0)';
            document.getElementById('bottom-nav').style.opacity = '1';
            renderTracks();
        }

        function toggleNpPlay() {
            isPlaying = !isPlaying;
            const text = document.getElementById('np-play-text');
            const btn = document.getElementById('np-play-btn');
            if (isPlaying) {
                text.innerText = "Pause";
                btn.classList.remove('bg-blue-accent');
                btn.classList.add('bg-black');
            } else {
                text.innerText = "Play";
                btn.classList.remove('bg-black');
                btn.classList.add('bg-blue-accent');
            }
            renderTracks();
        }

        function skip(seconds) {
            const btn = event.currentTarget;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = '', 150);
            const fill = document.getElementById('np-progress-fill');
            const currentWidth = parseFloat(fill.style.width) || 16;
            const delta = seconds > 0 ? 5 : -5;
            fill.style.width = Math.max(0, Math.min(100, currentWidth + delta)) + '%';
        }

        renderTracks();
    </script>
</body>
</html>
